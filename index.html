
                        <!DOCTYPE html>
                        <html lang="en">
                        <head>
                            <meta charset="UTF-8">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <style>
                body {
                  background-color: white; /* Ensure the iframe has a white background */
                }

                
              </style>
                        </head>
                        <body>
                            <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL Chat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
        }

        h1, h2, h3, .brand-font {
            font-family: 'Outfit', sans-serif;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Message Bubbles */
        .msg-sent {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 4px 15px -3px rgba(79, 70, 229, 0.4);
            border-radius: 18px 18px 4px 18px;
        }

        .msg-received {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 18px 18px 18px 4px;
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .bg-mesh {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        }

        /* Loader */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid #6366f1;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center bg-mesh selection:bg-indigo-500 selection:text-white">

    <!-- LOGIN VIEW -->
    <div id="login-view" class="w-full max-w-md p-6 z-50 transition-opacity duration-500">
        <div class="glass rounded-3xl p-8 shadow-2xl border border-slate-700/50 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-indigo-600 to-purple-700 flex items-center justify-center text-white shadow-lg shadow-indigo-500/30 mb-4">
                    <i class="ph-bold ph-chat-teardrop-text text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold brand-font text-white mb-2">RL Chat</h1>
                <p class="text-slate-400 text-sm">Accedi per sincronizzare i messaggi.</p>
            </div>

            <form id="email-login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">Email</label>
                    <div class="relative">
                        <i class="ph ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="email" id="email" required class="w-full bg-slate-800/50 border border-slate-700 text-white rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-slate-600" placeholder="nome@esempio.com">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">Password</label>
                    <div class="relative">
                        <i class="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="password" id="password" required class="w-full bg-slate-800/50 border border-slate-700 text-white rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-slate-600" placeholder="••••••••">
                    </div>
                </div>
                
                <div id="login-error" class="text-red-400 text-xs text-center hidden bg-red-500/10 py-2 rounded-lg border border-red-500/20"></div>

                <button type="submit" id="login-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl shadow-lg shadow-indigo-500/20 transition-all active:scale-95 flex justify-center items-center gap-2">
                    <span>Accedi</span>
                </button>
            </form>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-700"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#162032] px-2 text-slate-500 rounded">Oppure continua con</span></div>
            </div>

            <button id="google-btn" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-medium py-3 rounded-xl border border-slate-700 transition-all active:scale-95 flex justify-center items-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>
            
            <p class="mt-6 text-center text-xs text-slate-500">
                Non hai un account? <a href="#" id="toggle-register" class="text-indigo-400 hover:text-indigo-300">Registrati</a>
            </p>
        </div>
    </div>

    <!-- CHAT APP VIEW -->
    <div id="app-view" class="w-full h-full max-w-[1600px] flex overflow-hidden relative sm:h-[90vh] sm:w-[95vw] sm:rounded-3xl shadow-2xl glass border border-slate-700/50 hidden opacity-0 transition-opacity duration-500">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="w-full sm:w-[380px] flex flex-col border-r border-slate-700/50 bg-slate-900/80 z-20 transition-transform duration-300 absolute sm:relative h-full backdrop-blur-xl">
            
            <header class="h-[80px] px-6 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white shadow-lg shadow-indigo-500/20">
                        <i class="ph-bold ph-chat-teardrop-text text-xl"></i>
                    </div>
                    <span class="text-xl font-bold brand-font tracking-wide text-white">RL Chat</span>
                </div>
                <div class="flex items-center gap-3">
                     <div class="text-right hidden md:block">
                        <div id="user-name-display" class="text-xs font-bold text-white">Utente</div>
                        <div id="user-email-display" class="text-[10px] text-slate-400 truncate max-w-[100px]">email@test.it</div>
                    </div>
                    <button id="logout-btn" class="w-8 h-8 rounded-lg hover:bg-red-500/10 flex items-center justify-center text-slate-400 hover:text-red-400 transition-colors" title="Esci">
                        <i class="ph ph-sign-out text-xl"></i>
                    </button>
                </div>
            </header>

            <div class="px-6 pb-4">
                <div class="relative group">
                    <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-400 transition-colors"></i>
                    <input type="text" placeholder="Cerca conversazioni..." class="w-full bg-slate-800/50 border border-slate-700 text-slate-200 rounded-2xl py-3 pl-12 pr-4 text-sm focus:outline-none focus:border-indigo-500/50 focus:bg-slate-800 transition-all placeholder-slate-500">
                </div>
            </div>

            <div id="contact-list" class="flex-1 overflow-y-auto px-3 space-y-1">
                <!-- JS Injected -->
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="flex-1 flex flex-col relative w-full bg-slate-900/40">
            
            <div id="empty-state" class="hidden sm:flex flex-col items-center justify-center h-full text-center p-10">
                <div class="w-32 h-32 bg-slate-800/50 rounded-full flex items-center justify-center mb-6 animate-pulse">
                    <i class="ph-duotone ph-planet text-6xl text-indigo-400"></i>
                </div>
                <h2 class="text-3xl font-bold text-white mb-2 brand-font">Benvenuto su RL Chat</h2>
                <p class="text-slate-400 max-w-md">Seleziona una chat per iniziare a comunicare.</p>
            </div>

            <div id="active-chat-interface" class="flex flex-col h-full w-full hidden">
                
                <header class="h-[80px] px-6 flex justify-between items-center shrink-0 border-b border-slate-700/50 glass">
                    <div class="flex items-center gap-4">
                        <button id="back-btn" class="sm:hidden text-slate-400 hover:text-white">
                            <i class="ph-bold ph-arrow-left text-xl"></i>
                        </button>
                        <div class="relative">
                            <img id="chat-avatar" src="" class="w-11 h-11 rounded-full object-cover ring-2 ring-slate-700">
                            <div id="chat-status-dot" class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 rounded-full border-2 border-slate-900 hidden"></div>
                        </div>
                        <div>
                            <h3 id="chat-name" class="text-white font-semibold text-lg leading-none mb-1">Name</h3>
                            <span id="chat-subtitle" class="text-indigo-400 text-xs font-medium">Online</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="w-10 h-10 rounded-full hover:bg-slate-800 flex items-center justify-center text-slate-400 transition-all hover:text-indigo-400"><i class="ph ph-phone text-xl"></i></button>
                        <button class="w-10 h-10 rounded-full hover:bg-slate-800 flex items-center justify-center text-slate-400 transition-all hover:text-indigo-400"><i class="ph ph-video-camera text-xl"></i></button>
                    </div>
                </header>

                <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-6 scroll-smooth">
                    <!-- Messages injected here -->
                </div>

                <footer class="p-4 glass border-t border-slate-700/50">
                    <div class="max-w-4xl mx-auto flex items-end gap-3 bg-slate-800/50 p-2 rounded-3xl border border-slate-700/50 focus-within:border-indigo-500/50 focus-within:bg-slate-800 transition-all shadow-lg">
                        <textarea id="message-input" rows="1" placeholder="Scrivi un messaggio..." class="w-full bg-transparent text-slate-200 placeholder-slate-500 text-sm py-3 px-2 focus:outline-none resize-none max-h-32 scrollbar-hide"></textarea>
                        <button id="send-btn" class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center text-white shadow-lg shadow-indigo-500/30 hover:bg-indigo-500 hover:scale-105 active:scale-95 transition-all">
                            <i class="ph-bold ph-paper-plane-right text-lg"></i>
                        </button>
                    </div>
                </footer>
            </div>
        </main>
    </div>

    <script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAVJa4vv1BmK_GOB0RwJxDHoAySNlhjIc8",
            authDomain: "rl-chats.firebaseapp.com",
            projectId: "rl-chats",
            storageBucket: "rl-chats.firebasestorage.app",
            messagingSenderId: "339897083919",
            appId: "1:339897083919:web:8831b7ca535559ae6c9b7a"
        };

        // Initialize Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            console.log("Firebase initialized successfully");
        } catch (e) {
            console.error("Firebase init error:", e);
            alert("Errore inizializzazione Firebase. Controlla la console.");
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        // --- DOM ELEMENTS ---
        const loginView = document.getElementById('login-view');
        const appView = document.getElementById('app-view');
        const emailForm = document.getElementById('email-login-form');
        const googleBtn = document.getElementById('google-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const toggleRegister = document.getElementById('toggle-register');
        const loginError = document.getElementById('login-error');
        const loginBtnText = document.querySelector('#login-btn span');
        const userNameDisplay = document.getElementById('user-name-display');
        const userEmailDisplay = document.getElementById('user-email-display');
        
        const loginLoader = document.createElement('div');
        loginLoader.className = 'loader';

        // --- AUTH LOGIC ---

        function setLoading(isLoading) {
            if (isLoading) {
                loginBtnText.textContent = 'Accesso in corso...';
                document.getElementById('login-btn').appendChild(loginLoader);
                document.getElementById('login-btn').disabled = true;
            } else {
                loginBtnText.textContent = 'Accedi';
                loginLoader.remove();
                document.getElementById('login-btn').disabled = false;
            }
        }

        function showError(msg) {
            loginError.textContent = msg;
            loginError.classList.remove('hidden');
        }

        function handleAuthSuccess(user) {
            userNameDisplay.textContent = user.displayName || user.email.split('@')[0];
            userEmailDisplay.textContent = user.email;

            loginView.style.opacity = '0';
            setTimeout(() => {
                loginView.classList.add('hidden');
                appView.classList.remove('hidden');
                void appView.offsetWidth; 
                appView.style.opacity = '1';
                initChatApp(user);
            }, 500);
        }

        emailForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const isRegistering = toggleRegister.textContent === "Accedi";

            loginError.classList.add('hidden');
            setLoading(true);

            if (isRegistering) {
                auth.createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        return userCredential.user.updateProfile({ displayName: email.split('@')[0] })
                            .then(() => userCredential.user);
                    })
                    .then((user) => handleAuthSuccess(user))
                    .catch((error) => showError(getErrorMessage(error.code)))
                    .finally(() => setLoading(false));
            } else {
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => handleAuthSuccess(userCredential.user))
                    .catch((error) => showError(getErrorMessage(error.code)))
                    .finally(() => setLoading(false));
            }
        });

        googleBtn.addEventListener('click', () => {
            loginError.classList.add('hidden');
            auth.signInWithPopup(provider)
                .then((result) => handleAuthSuccess(result.user))
                .catch((error) => showError(getErrorMessage(error.code)));
        });

        logoutBtn.addEventListener('click', () => {
            auth.signOut();
            window.location.reload();
        });

        let isLoginMode = true;
        toggleRegister.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                toggleRegister.textContent = "Registrati";
                document.querySelector('button[type="submit"] span').textContent = "Accedi";
                document.querySelector('p.text-xs.text-slate-500').innerHTML = `Non hai un account? <a href="#" id="toggle-register" class="text-indigo-400 hover:text-indigo-300">Registrati</a>`;
            } else {
                toggleRegister.textContent = "Accedi";
                document.querySelector('button[type="submit"] span').textContent = "Registrati";
                document.querySelector('p.text-xs.text-slate-500').innerHTML = `Hai già un account? <a href="#" id="toggle-register" class="text-indigo-400 hover:text-indigo-300">Accedi</a>`;
            }
            document.getElementById('toggle-register').addEventListener('click', arguments.callee);
        });

        function getErrorMessage(code) {
            switch(code) {
                case 'auth/user-not-found': return 'Utente non trovato.';
                case 'auth/wrong-password': return 'Password errata.';
                case 'auth/email-already-in-use': return 'Email già registrata.';
                case 'auth/weak-password': return 'Password troppo debole (min 6 caratteri).';
                case 'auth/invalid-email': return 'Email non valida.';
                case 'auth/popup-closed-by-user': return 'Accesso annullato.';
                default: return 'Errore: ' + code;
            }
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                handleAuthSuccess(user);
            } else {
                loginView.classList.remove('hidden');
            }
        });

        // --- REAL-TIME CHAT LOGIC ---

        // Mock Contacts Data
        const contacts = [
            {
                id: "general_chat",
                name: "Chat Generale",
                role: "Canale Pubblico",
                avatar: "https://ui-avatars.com/api/?name=General&background=6366f1&color=fff",
                status: "online",
                lastMessage: "...",
                time: "",
                unread: 0
            },
            {
                id: "dev_team",
                name: "Dev Team",
                role: "Gruppo Sviluppatori",
                avatar: "https://ui-avatars.com/api/?name=Dev+Team&background=10b981&color=fff",
                status: "group",
                lastMessage: "...",
                time: "",
                unread: 0
            }
        ];

        let activeContactId = null;
        let unsubscribeMessages = null; // To stop listening when switching chats
        let currentUser = null;

        const contactListEl = document.getElementById('contact-list');
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const sidebar = document.getElementById('sidebar');
        const emptyState = document.getElementById('empty-state');
        const activeChatInterface = document.getElementById('active-chat-interface');
        const backBtn = document.getElementById('back-btn');
        const chatAvatar = document.getElementById('chat-avatar');
        const chatName = document.getElementById('chat-name');
        const chatSubtitle = document.getElementById('chat-subtitle');
        const chatStatusDot = document.getElementById('chat-status-dot');

        function initChatApp(user) {
            currentUser = user;
            renderContacts();
            if (window.innerWidth >= 640) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            }
        }

        function renderContacts() {
            contactListEl.innerHTML = '';
            contacts.forEach(contact => {
                const isActive = contact.id === activeContactId;
                const div = document.createElement('div');
                div.className = `group flex items-center gap-4 p-3 rounded-2xl cursor-pointer transition-all duration-200 ${isActive ? 'bg-indigo-600/10 border border-indigo-500/20' : 'hover:bg-slate-800/50 border border-transparent'}`;
                div.onclick = () => loadChat(contact.id);

                div.innerHTML = `
                    <div class="relative">
                        <img src="${contact.avatar}" alt="${contact.name}" class="w-12 h-12 rounded-full object-cover">
                        ${contact.status === 'online' ? `<div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-emerald-500 rounded-full border-2 border-slate-900"></div>` : ''}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-baseline mb-1">
                            <h4 class="text-sm font-semibold truncate ${isActive ? 'text-indigo-300' : 'text-slate-200'}">${contact.name}</h4>
                            <span class="text-xs ${isActive ? 'text-indigo-400' : 'text-slate-500'}">${contact.role}</span>
                        </div>
                    </div>
                `;
                contactListEl.appendChild(div);
            });
        }

        function loadChat(id) {
            activeContactId = id;
            const contact = contacts.find(c => c.id === id);
            renderContacts();
            
            if (window.innerWidth < 640) {
                sidebar.classList.add('-translate-x-full');
                setTimeout(() => sidebar.classList.add('hidden'), 300);
                activeChatInterface.classList.remove('hidden');
            }

            emptyState.classList.add('hidden');
            activeChatInterface.classList.remove('hidden');
            activeChatInterface.classList.add('flex');

            chatAvatar.src = contact.avatar;
            chatName.textContent = contact.name;
            chatSubtitle.textContent = contact.role;
            
            if(contact.status === 'online') {
                chatStatusDot.classList.remove('hidden');
                chatSubtitle.textContent = "Online";
                chatSubtitle.className = "text-emerald-400 text-xs font-medium";
            } else {
                chatStatusDot.classList.add('hidden');
                chatSubtitle.className = "text-slate-500 text-xs font-medium";
            }

            // Start Real-time Listener for this chat
            listenToMessages(id);
        }

        function listenToMessages(chatId) {
            // Unsubscribe from previous chat if exists
            if (unsubscribeMessages) {
                unsubscribeMessages();
            }

            messagesContainer.innerHTML = '<div class="flex justify-center my-4"><span class="text-xs font-medium text-slate-500 bg-slate-800/50 px-3 py-1 rounded-full">Caricamento messaggi...</span></div>';

            // Listen to Firestore Collection 'messages' filtered by chatId
            // Note: If index is missing, check console for link to create it
            unsubscribeMessages = db.collection('messages')
                .where('chatId', '==', chatId)
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    messagesContainer.innerHTML = '<div class="flex justify-center my-4"><span class="text-xs font-medium text-slate-500 bg-slate-800/50 px-3 py-1 rounded-full">Oggi</span></div>';
                    
                    if (snapshot.empty) {
                        messagesContainer.innerHTML += '<div class="text-center text-slate-500 text-sm mt-10">Nessun messaggio. Inizia la conversazione!</div>';
                    }

                    snapshot.forEach((doc) => {
                        const msg = doc.data();
                        appendMessageToDOM(msg);
                    });
                    scrollToBottom();
                }, (error) => {
                    console.error("Error fetching messages: ", error);
                    if (error.code === 'failed-precondition') {
                        messagesContainer.innerHTML = '<div class="text-center text-yellow-400 text-sm mt-10">Indice non creato. Clicca sul link in console per crearlo.</div>';
                    } else {
                        messagesContainer.innerHTML = '<div class="text-center text-red-400 text-sm mt-10">Errore nel caricamento messaggi. Controlla la console.</div>';
                    }
                });
        }

        function appendMessageToDOM(msg) {
            const isMe = msg.senderId === currentUser.uid;
            const div = document.createElement('div');
            div.className = `flex w-full ${isMe ? 'justify-end' : 'justify-start'} animate-slide-up`;
            
            let nameHtml = '';
            if (!isMe && msg.senderName) {
                nameHtml = `<span class="text-indigo-400 text-xs font-bold mb-1 ml-1 block">${msg.senderName}</span>`;
            }

            // Format time
            const date = msg.timestamp ? msg.timestamp.toDate() : new Date();
            const timeString = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;

            div.innerHTML = `
                <div class="relative max-w-[75%] px-5 py-3 text-[15px] leading-relaxed ${isMe ? 'msg-sent text-white' : 'msg-received text-slate-200'} flex flex-col mb-1">
                    ${nameHtml}
                    <span class="break-words whitespace-pre-wrap">${msg.text}</span>
                    <div class="self-end flex items-center gap-1 mt-1 opacity-70">
                        <span class="text-[10px] font-medium">${timeString}</span>
                        ${isMe ? '<i class="ph-fill ph-checks text-xs"></i>' : ''}
                    </div>
                </div>
            `;
            messagesContainer.appendChild(div);
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !activeContactId) return;

            messageInput.value = '';
            messageInput.style.height = 'auto';

            // Save to Firestore
            try {
                await db.collection('messages').add({
                    chatId: activeContactId,
                    text: text,
                    senderId: currentUser.uid,
                    senderName: currentUser.displayName || currentUser.email.split('@')[0],
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (error) {
                console.error("Error sending message: ", error);
                alert("Errore nell'invio: " + error.message);
            }
        }

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        backBtn.addEventListener('click', () => {
            sidebar.classList.remove('hidden');
            setTimeout(() => sidebar.classList.remove('-translate-x-full'), 10);
            activeContactId = null;
            renderContacts();
        });

    </script>
</body>
</html>
