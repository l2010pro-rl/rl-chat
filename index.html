<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RL Chat - Advanced</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
            margin: 0;
            height: 100vh;
            width: 100vw;
        }
        h1, h2, h3, .brand-font { font-family: 'Outfit', sans-serif; }
        
        /* Glassmorphism */
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-header { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Bubbles */
        .msg-sent { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); border-radius: 18px 18px 4px 18px; }
        .msg-received { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); border-radius: 18px 18px 18px 4px; }
        
        /* Animations */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        
        /* Background */
        .bg-mesh {
            background-color: #0f172a;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        }

        /* Toggle Switch */
        .toggle-checkbox:checked { right: 0; border-color: #6366f1; }
        .toggle-checkbox:checked + .toggle-label { background-color: #6366f1; }

        /* Image Preview */
        .msg-image { max-width: 250px; border-radius: 12px; margin-top: 5px; cursor: pointer; transition: transform 0.2s; }
        .msg-image:hover { transform: scale(1.02); }

        /* Context Menu */
        #context-menu {
            position: absolute;
            z-index: 1000;
            display: none;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-mesh text-slate-200">

    <!-- CONTEXT MENU (Right Click) -->
    <div id="context-menu" class="bg-slate-800/90 border border-slate-700 rounded-lg shadow-xl py-1 w-40 animate-fade-in">
        <button id="ctx-copy" class="w-full text-left px-4 py-2 text-sm hover:bg-indigo-600/20 hover:text-indigo-400 flex items-center gap-2">
            <i class="ph ph-copy"></i> Copia
        </button>
        <button id="ctx-delete" class="w-full text-left px-4 py-2 text-sm hover:bg-red-600/20 hover:text-red-400 flex items-center gap-2">
            <i class="ph ph-trash"></i> Elimina
        </button>
    </div>

    <!-- LOGIN VIEW -->
    <div id="login-view" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-sm transition-opacity duration-500">
        <div class="w-full max-w-md bg-slate-800/50 rounded-3xl p-8 shadow-2xl border border-slate-700/50 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-indigo-600 to-purple-700 flex items-center justify-center text-white shadow-lg shadow-indigo-500/30 mb-4">
                    <i class="ph-bold ph-chat-teardrop-text text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold brand-font text-white mb-2">RL Chat</h1>
                <p class="text-slate-400 text-sm">Accedi per connetterti.</p>
            </div>

            <form id="email-login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">Email</label>
                    <div class="relative">
                        <i class="ph ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="email" id="email" required class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:border-indigo-500 transition-all placeholder-slate-600" placeholder="nome@esempio.com">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">Password</label>
                    <div class="relative">
                        <i class="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="password" id="password" required class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:border-indigo-500 transition-all placeholder-slate-600" placeholder="••••••••">
                    </div>
                </div>
                
                <div id="login-error" class="text-red-400 text-xs text-center hidden bg-red-500/10 py-2 rounded-lg border border-red-500/20"></div>

                <button type="submit" id="login-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl shadow-lg shadow-indigo-500/20 transition-all active:scale-95 flex justify-center items-center gap-2">
                    <span>Accedi</span>
                </button>
            </form>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-700"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-slate-800 px-2 text-slate-500 rounded">Oppure</span></div>
            </div>

            <button id="google-btn" class="w-full bg-slate-700/50 hover:bg-slate-700 text-white font-medium py-3 rounded-xl border border-slate-600 transition-all active:scale-95 flex justify-center items-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>
            
            <p class="mt-6 text-center text-xs text-slate-500">
                <a href="#" id="toggle-register" class="text-indigo-400 hover:text-indigo-300">Registrati</a> se non hai un account.
            </p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-view" class="hidden w-full h-full flex opacity-0 transition-opacity duration-500">
        <aside id="sidebar" class="w-full sm:w-[350px] flex flex-col glass z-20 absolute sm:relative h-full transition-transform duration-300 transform -translate-x-full sm:translate-x-0">
            <header class="h-[70px] px-5 flex justify-between items-center shrink-0 glass-header">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white shadow-lg">
                        <i class="ph-bold ph-chat-teardrop-text text-lg"></i>
                    </div>
                    <span class="text-lg font-bold brand-font tracking-wide text-white">RL Chat</span>
                </div>
                <button id="settings-btn" class="w-9 h-9 rounded-full hover:bg-slate-700/50 flex items-center justify-center text-slate-400 transition-colors">
                    <i class="ph ph-gear text-xl"></i>
                </button>
            </header>
            <div id="contact-list" class="flex-1 overflow-y-auto px-2 py-2 space-y-1"></div>
        </aside>

        <main class="flex-1 flex flex-col relative w-full bg-slate-900/50">
            <div id="empty-state" class="hidden sm:flex flex-col items-center justify-center h-full text-center p-10">
                <div class="w-24 h-24 bg-slate-800/50 rounded-full flex items-center justify-center mb-6 animate-pulse">
                    <i class="ph-duotone ph-planet text-5xl text-indigo-400"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2 brand-font">Nessuna chat selezionata</h2>
                <p class="text-slate-400 max-w-sm">Apri le impostazioni per aggiungere un contatto.</p>
            </div>

            <div id="active-chat-interface" class="flex flex-col h-full w-full hidden">
                <header class="h-[70px] px-5 flex justify-between items-center shrink-0 glass-header z-10">
                    <div class="flex items-center gap-3">
                        <button id="back-btn" class="sm:hidden text-slate-400 hover:text-white mr-1"><i class="ph-bold ph-arrow-left text-xl"></i></button>
                        <img id="chat-avatar" src="" class="w-9 h-9 rounded-full object-cover ring-2 ring-slate-700">
                        <div>
                            <h3 id="chat-name" class="text-white font-semibold text-base leading-none">Name</h3>
                            <span id="chat-subtitle" class="text-indigo-400 text-xs">Online</span>
                        </div>
                    </div>
                </header>
                <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4 scroll-smooth bg-mesh/30"></div>
                
                <!-- Typing Indicator -->
                <div id="typing-indicator" class="hidden px-6 py-1 text-xs text-slate-400 italic absolute bottom-20 left-0 animate-pulse">
                    Sta scrivendo...
                </div>

                <footer class="p-3 glass-header border-t border-slate-700/50">
                    <div class="max-w-5xl mx-auto flex items-end gap-2 bg-slate-800/50 p-1.5 rounded-2xl border border-slate-700/50 focus-within:border-indigo-500/50 transition-all">
                        <!-- Image Upload Button -->
                        <input type="file" id="image-input" accept="image/*" class="hidden">
                        <button onclick="document.getElementById('image-input').click()" class="w-9 h-9 rounded-xl hover:bg-slate-700/50 flex items-center justify-center text-slate-400 hover:text-indigo-400 transition-colors shrink-0 mb-0.5">
                            <i class="ph ph-image text-xl"></i>
                        </button>
                        
                        <textarea id="message-input" rows="1" placeholder="Scrivi un messaggio..." class="w-full bg-transparent text-slate-200 placeholder-slate-500 text-sm py-2.5 px-3 focus:outline-none resize-none max-h-32 scrollbar-hide"></textarea>
                        <button id="send-btn" class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center text-white shadow-lg shadow-indigo-500/30 hover:bg-indigo-500 hover:scale-105 active:scale-95 transition-all shrink-0 mb-0.5">
                            <i class="ph-bold ph-paper-plane-right text-lg"></i>
                        </button>
                    </div>
                </footer>
            </div>
        </main>

        <!-- SETTINGS MODAL -->
        <div id="settings-modal" class="fixed inset-0 z-50 bg-slate-900/90 backdrop-blur-md hidden flex justify-end sm:justify-center sm:items-center">
            <div class="w-full sm:max-w-md h-full sm:h-[85vh] sm:rounded-3xl bg-slate-900 border-l sm:border border-slate-700 shadow-2xl flex flex-col animate-slide-up">
                <div class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-800/50">
                    <h3 class="text-xl font-bold text-white brand-font">Impostazioni</h3>
                    <button id="close-settings" class="w-8 h-8 rounded-full bg-slate-700/50 hover:bg-slate-700 flex items-center justify-center text-slate-300 transition-colors"><i class="ph ph-x text-lg"></i></button>
                </div>
                
                <div class="flex-1 overflow-y-auto p-0">
                    <div class="p-6 flex flex-col items-center border-b border-slate-800 bg-gradient-to-b from-slate-800/30 to-transparent">
                        <div class="relative group cursor-pointer">
                            <img id="settings-avatar" src="" class="w-24 h-24 rounded-full ring-4 ring-slate-800 shadow-xl object-cover">
                        </div>
                        <h2 id="settings-name" class="mt-4 text-xl font-bold text-white">Nome Utente</h2>
                        <p id="settings-email" class="text-sm text-slate-400">email@example.com</p>
                        <button id="edit-profile-btn" class="mt-4 text-xs font-medium text-indigo-400 hover:text-indigo-300 border border-indigo-500/30 px-3 py-1 rounded-full hover:bg-indigo-500/10 transition-colors">Modifica Profilo</button>
                    </div>

                    <div class="p-5">
                        <div class="bg-gradient-to-r from-indigo-900/50 to-purple-900/50 p-4 rounded-2xl border border-indigo-500/30 relative overflow-hidden">
                            <label class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest mb-1 block">Il tuo RL ID</label>
                            <div class="flex items-center justify-between relative z-10">
                                <code id="my-rl-id" class="text-2xl font-mono text-white tracking-widest font-bold">...</code>
                                <button onclick="copyToClipboard()" class="p-2 hover:bg-white/10 rounded-lg transition-colors text-indigo-300"><i class="ph ph-copy text-xl"></i></button>
                            </div>
                        </div>
                    </div>

                    <div class="px-5 pb-5">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">Nuova Chat</label>
                        <div class="flex gap-2">
                            <input type="text" id="add-contact-input" placeholder="Inserisci RL ID" maxlength="10" class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:border-indigo-500 focus:outline-none uppercase font-mono tracking-widest">
                            <button id="add-contact-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 rounded-xl transition-colors"><i class="ph-bold ph-user-plus text-xl"></i></button>
                        </div>
                        <div id="add-contact-msg" class="text-xs mt-2 hidden"></div>
                    </div>

                    <div class="px-2 pb-20">
                        <div class="text-xs font-bold text-slate-500 uppercase px-4 py-2">Aspetto & Privacy</div>
                        <div class="flex items-center justify-between px-4 py-3 hover:bg-slate-800/50 rounded-xl transition-colors cursor-pointer">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-slate-400"><i class="ph ph-moon text-lg"></i></div>
                                <div><div class="text-sm font-medium text-slate-200">Modalità Notte</div></div>
                            </div>
                            <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" checked class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300"/>
                                <label class="toggle-label block overflow-hidden h-5 rounded-full bg-indigo-600 cursor-pointer"></label>
                            </div>
                        </div>
                        <div class="px-4 py-2">
                            <button onclick="clearCache()" class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-red-500/10 group transition-colors">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-lg bg-slate-800 group-hover:bg-red-500/20 flex items-center justify-center text-slate-400 group-hover:text-red-400 transition-colors"><i class="ph ph-trash text-lg"></i></div>
                                    <span class="text-sm font-medium text-slate-300 group-hover:text-red-400">Pulisci Cache Locale</span>
                                </div>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="p-4 border-t border-slate-800 bg-slate-900 flex justify-between items-center">
                    <span class="text-[10px] text-slate-600 font-mono">v1.3.0 • RL Chat</span>
                    <button id="logout-btn-settings" class="text-red-400 hover:text-red-300 text-sm font-medium flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-red-500/10 transition-colors"><i class="ph ph-sign-out"></i> Esci</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAVJa4vv1BmK_GOB0RwJxDHoAySNlhjIc8",
            authDomain: "rl-chats.firebaseapp.com",
            projectId: "rl-chats",
            storageBucket: "rl-chats.firebasestorage.app",
            messagingSenderId: "339897083919",
            appId: "1:339897083919:web:8831b7ca535559ae6c9b7a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        // --- UTILS ---
        function generateRLID() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let result = '';
            for (let i = 0; i < 10; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            return result;
        }

        function copyToClipboard() {
            const code = document.getElementById('my-rl-id').innerText;
            if(code === "...") return;
            navigator.clipboard.writeText(code).then(() => alert("ID Copiato!"));
        }

        function clearCache() {
            if(confirm("Pulire la cache?")) { localStorage.clear(); window.location.reload(); }
        }

        // --- STATE ---
        let currentUser = null;
        let currentChatId = null;
        let unsubscribeMessages = null;
        let typingTimeout = null;
        let contextMessageId = null;

        // --- DOM ELEMENTS ---
        const loginView = document.getElementById('login-view');
        const appView = document.getElementById('app-view');
        const settingsModal = document.getElementById('settings-modal');
        const contactListEl = document.getElementById('contact-list');
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const imageInput = document.getElementById('image-input');
        const contextMenu = document.getElementById('context-menu');
        
        // --- AUTH LOGIC ---
        async function handleAuthSuccess(user) {
            currentUser = user;
            const userRef = db.collection('users').doc(user.uid);
            const doc = await userRef.get();
            
            let rlId = "";
            if (!doc.exists) {
                rlId = generateRLID();
                await userRef.set({
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName || user.email.split('@')[0],
                    photoURL: user.photoURL || `https://ui-avatars.com/api/?name=${user.email}&background=6366f1&color=fff`,
                    rlId: rlId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } else {
                rlId = doc.data().rlId;
            }

            document.getElementById('settings-name').textContent = user.displayName || "Utente";
            document.getElementById('settings-email').textContent = user.email;
            document.getElementById('settings-avatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.email}`;
            document.getElementById('my-rl-id').textContent = rlId;

            loginView.style.opacity = '0';
            setTimeout(() => {
                loginView.classList.add('hidden');
                appView.classList.remove('hidden');
                void appView.offsetWidth; 
                appView.style.opacity = '1';
                loadContacts();
            }, 500);
        }

        document.getElementById('email-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const isRegistering = document.getElementById('toggle-register').textContent === "Accedi";

            document.getElementById('login-error').classList.add('hidden');
            document.getElementById('login-btn').disabled = true;

            const promise = isRegistering 
                ? auth.createUserWithEmailAndPassword(email, password)
                : auth.signInWithEmailAndPassword(email, password);

            promise.then((cred) => {
                if(isRegistering) return cred.user.updateProfile({ displayName: email.split('@')[0] });
            })
            .then(() => handleAuthSuccess(auth.currentUser))
            .catch(err => {
                document.getElementById('login-error').textContent = err.message;
                document.getElementById('login-error').classList.remove('hidden');
                document.getElementById('login-btn').disabled = false;
            });
        });

        document.getElementById('google-btn').addEventListener('click', () => {
            auth.signInWithPopup(provider).then((result) => handleAuthSuccess(result.user)).catch(err => console.error(err));
        });

        document.getElementById('logout-btn-settings').addEventListener('click', () => { auth.signOut(); window.location.reload(); });

        document.getElementById('toggle-register').addEventListener('click', (e) => {
            e.preventDefault();
            const el = e.target;
            if (el.textContent === "Registrati") {
                el.textContent = "Accedi";
                document.querySelector('#login-btn span').textContent = "Registrati";
            } else {
                el.textContent = "Registrati";
                document.querySelector('#login-btn span').textContent = "Accedi";
            }
        });

        auth.onAuthStateChanged((user) => {
            if (user) handleAuthSuccess(user);
            else {
                loginView.classList.remove('hidden');
                appView.classList.add('hidden');
            }
        });

        // --- CHAT LOGIC ---
        async function loadContacts() {
            contactListEl.innerHTML = '';
            addContactToSidebar({
                id: "general_chat",
                name: "Chat Generale",
                role: "Pubblica",
                avatar: "https://ui-avatars.com/api/?name=General&background=6366f1&color=fff",
                lastMsg: "Benvenuto su RL Chat!",
                time: ""
            }, true);

            const savedContacts = JSON.parse(localStorage.getItem(`rl_contacts_${currentUser.uid}`) || "[]");
            savedContacts.forEach(c => addContactToSidebar(c, false));
        }

        function addContactToSidebar(contact, isTop) {
            const div = document.createElement('div');
            const isActive = contact.id === currentChatId;
            div.className = `group flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-all ${isActive ? 'bg-indigo-600/20 border border-indigo-500/30' : 'hover:bg-slate-800/50 border border-transparent'}`;
            div.onclick = () => openChat(contact);
            div.innerHTML = `
                <img src="${contact.avatar}" class="w-10 h-10 rounded-full object-cover bg-slate-800">
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-baseline">
                        <h4 class="text-sm font-semibold text-slate-200 truncate">${contact.name}</h4>
                    </div>
                    <p class="text-xs text-slate-400 truncate">${contact.lastMsg || 'Nuova chat'}</p>
                </div>
            `;
            if (isTop) contactListEl.prepend(div);
            else contactListEl.appendChild(div);
        }

        function openChat(contact) {
            currentChatId = contact.id;
            if (window.innerWidth < 640) document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('active-chat-interface').classList.remove('hidden');
            document.getElementById('chat-name').textContent = contact.name;
            document.getElementById('chat-subtitle').textContent = contact.role || 'Privato';
            document.getElementById('chat-avatar').src = contact.avatar;
            loadContacts();

            if (unsubscribeMessages) unsubscribeMessages();
            messagesContainer.innerHTML = '<div class="flex justify-center mt-10"><div class="loader" style="border-top-color:#6366f1; width:20px; height:20px; border:3px solid rgba(255,255,255,0.1); border-radius:50%; animation:spin 1s linear infinite;"></div></div>';

            // Listen to Messages
            unsubscribeMessages = db.collection('messages')
                .where('chatId', '==', contact.id)
                .orderBy('timestamp', 'asc')
                .onSnapshot(snapshot => {
                    messagesContainer.innerHTML = '';
                    let lastDate = null;

                    if (snapshot.empty) messagesContainer.innerHTML = '<div class="text-center text-slate-500 text-xs mt-10">Inizia la conversazione!</div>';
                    
                    snapshot.forEach(doc => {
                        const msg = doc.data();
                        const msgDate = msg.timestamp ? msg.timestamp.toDate().toDateString() : new Date().toDateString();
                        
                        // Date Separator
                        if (msgDate !== lastDate) {
                            const dateDiv = document.createElement('div');
                            dateDiv.className = "flex justify-center my-4";
                            dateDiv.innerHTML = `<span class="text-[10px] font-bold text-slate-500 bg-slate-800/50 px-2 py-1 rounded-full">${msgDate === new Date().toDateString() ? 'Oggi' : msgDate}</span>`;
                            messagesContainer.appendChild(dateDiv);
                            lastDate = msgDate;
                        }

                        renderMessage(doc.id, msg);
                        
                        // Mark as Read if not mine
                        if (msg.senderId !== currentUser.uid && !msg.read) {
                            db.collection('messages').doc(doc.id).update({ read: true });
                        }
                    });
                    scrollToBottom();
                });
            
            // Listen for Typing Status
            db.collection('chats').doc(contact.id).onSnapshot(doc => {
                if(doc.exists && doc.data().typingBy === currentUser.uid) {
                    // Don't show if I'm typing
                } else if (doc.exists && doc.data().typingBy) {
                    document.getElementById('typing-indicator').classList.remove('hidden');
                    setTimeout(() => document.getElementById('typing-indicator').classList.add('hidden'), 3000);
                }
            });
        }

        function renderMessage(id, msg) {
            const isMe = msg.senderId === currentUser.uid;
            const date = msg.timestamp ? msg.timestamp.toDate() : new Date();
            const time = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
            
            const div = document.createElement('div');
            div.className = `flex w-full ${isMe ? 'justify-end' : 'justify-start'} animate-slide-up group relative`;
            div.dataset.msgId = id;
            
            // Content
            let contentHtml = '';
            if (msg.imageUrl) {
                contentHtml = `<img src="${msg.imageUrl}" class="msg-image" onclick="window.open(this.src)">`;
            } else {
                contentHtml = `<p class="break-words leading-relaxed">${msg.text}</p>`;
            }

            // Read Receipts
            let statusIcon = '';
            if (isMe) {
                if (msg.read) {
                    statusIcon = '<i class="ph-fill ph-checks text-[#53bdeb]"></i>'; // Blue double check
                } else {
                    statusIcon = '<i class="ph-fill ph-checks text-slate-400"></i>'; // Grey double check
                }
            }

            div.innerHTML = `
                <div class="max-w-[80%] px-4 py-2 text-sm ${isMe ? 'msg-sent text-white' : 'msg-received text-slate-200'} relative">
                    ${contentHtml}
                    <div class="text-[10px] opacity-70 text-right mt-1 flex items-center justify-end gap-1 select-none">
                        ${time} ${statusIcon}
                    </div>
                </div>
            `;

            // Context Menu Event
            div.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                showContextMenu(e.pageX, e.pageY, id, isMe);
            });

            messagesContainer.appendChild(div);
        }

        function scrollToBottom() { messagesContainer.scrollTop = messagesContainer.scrollHeight; }

        // --- TYPING INDICATOR LOGIC ---
        messageInput.addEventListener('input', () => {
            if(currentChatId) {
                db.collection('chats').doc(currentChatId).set({
                    typingBy: currentUser.uid,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    db.collection('chats').doc(currentChatId).update({ typingBy: firebase.firestore.FieldValue.delete() });
                }, 2000);
            }
        });

        // --- SENDING MESSAGES ---
        async function sendMessage() {
            const text = messageInput.value.trim();
            if ((!text && !window.tempImage) || !currentChatId) return;

            const msgData = {
                chatId: currentChatId,
                senderId: currentUser.uid,
                senderName: currentUser.displayName,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                read: false
            };

            if (window.tempImage) {
                msgData.imageUrl = window.tempImage;
                msgData.text = "Immagine";
                window.tempImage = null; // Reset
            } else {
                msgData.text = text;
            }

            messageInput.value = '';
            messageInput.style.height = 'auto';

            try {
                await db.collection('messages').add(msgData);
            } catch (e) { alert("Errore invio: " + e.message); }
        }

        // --- IMAGE HANDLING ---
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                window.tempImage = event.target.result; // Base64 string
                sendMessage(); // Send immediately
            };
            reader.readAsDataURL(file);
            e.target.value = ''; // Reset input
        });

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        messageInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
        
        document.getElementById('back-btn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('-translate-x-full');
            currentChatId = null;
            document.getElementById('active-chat-interface').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
        });

        // --- CONTEXT MENU ---
        function showContextMenu(x, y, msgId, isMe) {
            contextMenu.style.display = 'block';
            contextMenu.style.left = `${x}px`;
            contextMenu.style.top = `${y}px`;
            contextMessageId = msgId;

            // Show/Hide Delete based on ownership
            const deleteBtn = document.getElementById('ctx-delete');
            if (isMe) {
                deleteBtn.style.display = 'flex';
            } else {
                deleteBtn.style.display = 'none';
            }
        }

        // Hide context menu on click elsewhere
        document.addEventListener('click', () => { contextMenu.style.display = 'none'; });

        // Copy Action
        document.getElementById('ctx-copy').addEventListener('click', async () => {
            if (!contextMessageId) return;
            const doc = await db.collection('messages').doc(contextMessageId).get();
            if (doc.exists && doc.data().text) {
                navigator.clipboard.writeText(doc.data().text);
            }
        });

        // Delete Action
        document.getElementById('ctx-delete').addEventListener('click', async () => {
            if (!contextMessageId) return;
            if (confirm("Eliminare questo messaggio?")) {
                await db.collection('messages').doc(contextMessageId).delete();
            }
        });

        // --- SETTINGS LOGIC ---
        document.getElementById('settings-btn').addEventListener('click', () => settingsModal.classList.remove('hidden'));
        document.getElementById('close-settings').addEventListener('click', () => settingsModal.classList.add('hidden'));

        document.getElementById('add-contact-btn').addEventListener('click', async () => {
            const input = document.getElementById('add-contact-input');
            const targetId = input.value.trim().toUpperCase();
            const msgDiv = document.getElementById('add-contact-msg');
            
            if (targetId.length !== 10) {
                msgDiv.textContent = "L'ID deve essere di 10 caratteri.";
                msgDiv.className = "text-red-400 text-xs mt-2 block";
                return;
            }

            msgDiv.textContent = "Ricerca...";
            msgDiv.className = "text-slate-400 text-xs mt-2 block";

            try {
                const snapshot = await db.collection('users').where('rlId', '==', targetId).get();
                if (snapshot.empty) {
                    msgDiv.textContent = "Utente non trovato.";
                    msgDiv.className = "text-red-400 text-xs mt-2 block";
                    return;
                }
                const userData = snapshot.docs[0].data();
                if (userData.uid === currentUser.uid) {
                    msgDiv.textContent = "Non puoi aggiungere te stesso.";
                    msgDiv.className = "text-red-400 text-xs mt-2 block";
                    return;
                }
                const uids = [currentUser.uid, userData.uid].sort();
                const chatId = uids.join('_');
                const newContact = { id: chatId, name: userData.displayName, role: "Privato", avatar: userData.photoURL, lastMsg: "Contatto aggiunto", time: "Adesso" };
                
                const saved = JSON.parse(localStorage.getItem(`rl_contacts_${currentUser.uid}`) || "[]");
                if (!saved.some(c => c.id === chatId)) {
                    saved.push(newContact);
                    localStorage.setItem(`rl_contacts_${currentUser.uid}`, JSON.stringify(saved));
                    addContactToSidebar(newContact, false);
                    input.value = '';
                    msgDiv.textContent = "Aggiunto!";
                    msgDiv.className = "text-green-400 text-xs mt-2 block";
                    setTimeout(() => { settingsModal.classList.add('hidden'); openChat(newContact); }, 1000);
                } else {
                    msgDiv.textContent = "Già presente.";
                    msgDiv.className = "text-yellow-400 text-xs mt-2 block";
                }
            } catch (err) {
                msgDiv.textContent = "Errore: " + err.message;
                msgDiv.className = "text-red-400 text-xs mt-2 block";
            }
        });

        document.getElementById('edit-profile-btn').addEventListener('click', () => {
            const newName = prompt("Nuovo nome:", currentUser.displayName);
            if(newName) {
                currentUser.updateProfile({ displayName: newName });
                document.getElementById('settings-name').textContent = newName;
            }
        });
    </script>
</body>
</html>
